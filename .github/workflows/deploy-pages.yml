name: Deploy to GitHub Pages

# معاينة ثابتة للواجهة على GitHub Pages (بدون مفاتيح — الأخبار/الفرز/التحليل
# تعرض رسالة "أضف المفتاح"، وشارتات TradingView تعمل). النشر الكامل مع الـ AI
# على Vercel كما في README.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (Pages base path)
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
